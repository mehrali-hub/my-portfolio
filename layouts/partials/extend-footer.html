<!-- Load Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- Custom CSS Animations -->
<style>
  /* Menu Slide Up and Fade In Animation */
  @keyframes slideUpFade {
    from {
      opacity: 0;
      transform: translateY(20px) scale(0.8);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .menu-active {
    display: block !important;
    animation: slideUpFade 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  /* Hover micro-interactions for links */
  #m-menu a:hover {
    transform: scale(1.15);
  }

  #m-button:hover {
    transform: scale(1.08);
  }
  
  #m-button:active {
    transform: scale(0.95);
  }
</style>

<script>
  const mButton = document.getElementById("m-button");
  const mMenu = document.getElementById("m-menu");

  mButton.onclick = function(e) {
    e.stopPropagation();
    mMenu.classList.toggle("menu-active");
  };

  // Close when clicking anywhere else on the page
  document.addEventListener("click", function() {
    mMenu.classList.remove("menu-active");
  });
</script>
